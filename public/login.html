<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HookRel — Login</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="mobile-overlay">
    <div class="mobile-overlay-content">
      <div class="mobile-overlay-icon">🪝</div>
      <h2>Hook<span class="wordmark-accent">Rel</span></h2>
      <p>This app is designed for desktop use.<br>Please open it on a larger screen.</p>
    </div>
  </div>

  <div class="login-page">
    <div class="login-box">

      <div class="login-logo">
        <div class="login-logo-emoji">🪝</div>
        <div class="login-wordmark">Hook<span>Rel</span></div>
        <div class="login-tagline">Webhooks in. Notifications out.</div>
      </div>

      <div class="login-card">
        <h2>Sign in</h2>
        <div id="loginError" class="message message-error" style="display:none"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" placeholder="Enter username" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter password" required>
          </div>
          <button type="submit" class="btn-primary" style="width:100%; justify-content:center; margin-top:8px" id="loginBtn">
            Sign in
          </button>
        </form>
      </div>

      <div class="login-footer">Copyright &copy; <span id="loginYear"></span> dBR Promotions. All rights reserved.</div>

    </div>
  </div>
  <script type="module" src="js/login.js"></script>
</body>
</html>
