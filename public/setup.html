<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HookRel — Setup</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="mobile-overlay">
    <div class="mobile-overlay-content">
      <div class="mobile-overlay-icon">🪝</div>
      <h2>Hook<span class="wordmark-accent">Rel</span></h2>
      <p>This app is designed for desktop use.<br>Please open it on a larger screen.</p>
    </div>
  </div>

  <div class="login-page">
    <div class="login-box">

      <div class="login-logo">
        <div class="login-logo-emoji">🪝</div>
        <div class="login-wordmark">Hook<span>Rel</span></div>
        <div class="login-tagline">First launch — create your admin account</div>
      </div>

      <div class="login-card">
        <h2>Create Admin Account</h2>
        <div class="message message-info" style="margin-bottom:16px">
          This account will have full admin access. You can add more users after setup.
        </div>
        <div id="setupError" class="message message-error" style="display:none"></div>
        <form id="setupForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" placeholder="Choose a username" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" placeholder="At least 8 characters" required>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" placeholder="Repeat password" required>
          </div>
          <button type="submit" class="btn-primary" style="width:100%; justify-content:center; margin-top:8px" id="setupBtn">
            Create Account &amp; Continue
          </button>
        </form>
      </div>

      <div class="login-footer">Copyright &copy; <span id="setupYear"></span> dBR Promotions. All rights reserved.</div>

    </div>
  </div>
  <script type="module" src="js/setup.js"></script>
</body>
</html>
